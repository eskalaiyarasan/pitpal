logging:
  level: INFO
  yaml: config/default/logconfig.yaml

  console:
    enabled: true

  file:
    enabled: true
    path: logs/pitpal.log
    rotate: size        # size | time

    sizerotation:
      max: 2048     # 2 MB
      backupcount: 5

    timerotation:
      when: midnight         # midnight | H | D
      interval: 1
      backupcount: 7

  format:
    style: text              # text | json
    pattern: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

  remote:
    enabled: false
    type: http               # http | syslog | socket
    url: http://localhost:9000/log
    timeout: 1
